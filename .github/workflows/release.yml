name: RELEASE

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - services
          - events
          - types
          - all
  repository_dispatch:
    types: [make_release]

env:
  GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
  HUSKY: 0
  ALL_PACKAGES: '["services","events","types"]'

jobs:
  detect-packages:
    name: Detect packages to release
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - name: Determine packages to release
        id: detect
        run: |
          ALL_PACKAGES='${{ env.ALL_PACKAGES }}'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.package }}" = "all" ]; then
              echo "packages=$ALL_PACKAGES" >> "$GITHUB_OUTPUT"
            else
              echo 'packages=["${{ inputs.package }}"]' >> "$GITHUB_OUTPUT"
            fi
          else
            echo "packages=$ALL_PACKAGES" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release ${{ matrix.package }}
    needs: detect-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
      fail-fast: false
      max-parallel: 1
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package quality gate
        run: pnpm run quality:ci:${{ matrix.package }}
        env:
          CI: true

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Run semantic-release
        run: pnpm run release:${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: true
